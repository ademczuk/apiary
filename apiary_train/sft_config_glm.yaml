# SFT overrides for GLM 5.1 32B.
# Pass with: --config apiary_train/sft_config_glm.yaml (consumed by your
# launcher script; the sft_lora CLI accepts all of these as flags).

base_model: THUDM/glm-5.1-32b-base
max_seq_len: 8192
batch_size: 2
grad_accum: 16
epochs: 2
lr: 1.0e-4
warmup_ratio: 0.03
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
# GLM uses the standard Llama-style projection names
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
bf16: true
gradient_checkpointing: true
packing: true
save_steps: 250
eval_steps: 250
logging_steps: 10
optim: adamw_torch
